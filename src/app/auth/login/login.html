<div class="login-container">
    <mat-card>
        <mat-card-title style="text-align: center; padding: 0 2%">Login</mat-card-title>
        <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 16px;">
            <mat-label>Username</mat-label>
            <input matInput formControlName="username" placeholder="Enter your username" />
            </mat-form-field>

            <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 16px;">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="Enter your email" />
            </mat-form-field>

            <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Login</button>
        </form>
        </mat-card-content>
        <ng-container>
            @if (authMsg$ | async; as auth) {
                <mat-card-footer>
                    @if (auth.message) {
                        <div [ngClass]="{'success-message': auth.statusCode === 200, 'error-message': auth.statusCode && auth.statusCode >= 400}">
                            {{ auth.message }}
                        </div>
                    }
                </mat-card-footer>
            }
            <!-- <mat-card-footer>
            <div *ngIf="authMsg$ | async as authMsg" style="margin-top: 16px; color: red;">
                {{ authMsg.message }}
            </div>
            </mat-card-footer> -->
        </ng-container>
    </mat-card>
</div>
