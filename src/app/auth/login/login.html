<div class="login-container">
    <mat-card>
        <mat-card-title style="text-align: center; padding: 0 2%">{{ 'LOGIN.TITLE' | translate }}</mat-card-title>
        <mat-card-content>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 16px;">
            <mat-label>{{ 'LOGIN.USERNAME' | translate }}</mat-label>
            <input matInput formControlName="username" placeholder="{{ 'LOGIN.USERNAME_PLACEHOLDER' | translate }}" />
            </mat-form-field>

            <mat-form-field appearance="outline" style="width: 100%; margin-bottom: 16px;">
            <mat-label>{{ 'LOGIN.EMAIL' | translate }}</mat-label>
            <input matInput formControlName="email" placeholder="{{ 'LOGIN.EMAIL_PLACEHOLDER' | translate }}" />
            </mat-form-field>

            <div style="display: flex; align-items: center; gap: 12px;">
                <button mat-raised-button color="primary" type="submit"
                    [disabled]="loginForm.invalid || (isLoading$ | async)">{{ 'LOGIN.SIGNIN' | translate }}</button>
                @if (isLoading$ | async) {
                    <mat-spinner diameter="24"></mat-spinner>
                }
            </div>
        </form>

        <div style="margin-top: 16px; text-align: center;">
            <span>{{ 'LOGIN.OR' | translate }}</span>
        </div>
        <div style="margin-top: 12px; display: flex; justify-content: center;">
            <button mat-stroked-button type="button" (click)="loginWithGoogle()">
                {{ 'LOGIN.LOGIN_WITH_GOOGLE' | translate }}
            </button>
        </div>
        </mat-card-content>

    </mat-card>
</div>
